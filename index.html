<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player red" id="red">
        <div class="info" id="redInfo">
            <div class="player-icon red-icon"></div>
            <p class="player-name">Red</p>
            <p id="rs">+0</p>
        </div>
        <div class="timer" id="redTimer">1:00</div>
    </div>
    <div class="map-container">
        <div class="map">
            <div class="forTitan">
                <div id="blueTitan1"></div>
                <div id="blueTitan2"></div>
                <div id="blueTitan3"></div>
                <div id="blueTitan4"></div>
                <div id="redTitan1"></div>
                <div id="redTitan2"></div>
                <div id="redTitan3"></div>
                <div id="redTitan4"></div>
                <div id="selector"></div>
            </div>
            <div id="Ttimer">10:00</div>
            <button id="toggle" onclick="toggle()">Play</button>
            <button id="reset" onclick="reset()">Reset</button>
        </div>
    </div>
    <div class="player blue" id="blue">
        <div class="info" id="blueInfo">
            <div class="player-icon blue-icon"></div>
            <p class="player-name">Blue</p>
            <p id="bs">+0</p>
        </div>
        <div class="timer" id="blueTimer">1:00</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
